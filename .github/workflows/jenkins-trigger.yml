name: Trigger Jenkins Build

on:
  push:
    branches: [ main ]

jobs:
  notify-jenkins:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Remote Jenkins Job
        run: |
          curl -X POST "${{ secrets.JENKINS_URL }}/job/eshop-pipeline/build?token=${{ secrets.JENKINS_JOB_TOKEN }}" \
          --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_API_TOKEN }}"
